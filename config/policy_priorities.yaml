# =============================================================================
# LAYER 2: Acquisition Framework Alignment (NEW — MEIA/KOP/JAR/PAE)
# =============================================================================
# Source: Hegseth-Feinberg memo (Aug 20, 2025), SPEED Act, FoRGED Act, FY26 NDAA
#
# STATUS: Partially active. Structural definitions are live; KOP list and MEIA
# experimentation data are pending public release. The system stubs these now and
# activates scoring when data sources come online.
#
# SCORING:
#   acquisition_tailwind = weighted sum of:
#     kop_alignment (0.40)    — alignment to ranked Key Operational Problems
#     pathway_position (0.30) — position in MEIA→JAR→PAE pipeline
#     commercial_fit (0.15)   — "presumption of commerciality" readiness
#     reform_tailwind (0.15)  — benefits from specific NDAA provisions

acquisition_framework:
  status: "partial"  # "partial" = structural defs only; "active" = KOP list ingested
  effective_date: "2025-08-20"  # Hegseth-Feinberg memo date
  implementation_deadline: "2025-12-18"  # 120 days for JCIDS disestablishment

  # When acquisition_framework.status == "active", blend with budget_priorities:
  blending:
    budget_weight: 0.60
    acquisition_weight: 0.40

  # ---------------------------------------------------------------------------
  # Key Operational Problems (KOPs)
  # ---------------------------------------------------------------------------
  # JROC ranks KOPs each budget cycle. When the ranked list is published,
  # ingest it here. Each KOP gets a rank-derived weight (rank 1 = highest).
  #
  # PLACEHOLDER: These are derived from public statements, NDS priorities, and
  # combatant command posture statements. Replace with official JROC-ranked list
  # when published.

  key_operational_problems:
    status: "estimated"  # "estimated" = inferred from public sources; "official" = JROC-ranked list

    problems:
      - id: kop_001
        name: "Defeat massed drone/missile saturation attacks"
        description: >
          Counter-UAS and integrated air/missile defense against large-scale
          coordinated attacks. Includes directed energy, EW-based defeat,
          kinetic intercept at scale, and sensor fusion for threat discrimination.
        estimated_rank: 1
        maps_to_budget_priorities:
          - autonomous_systems
          - electronic_warfare
        technology_indicators:
          - counter-UAS
          - directed energy
          - integrated air defense
          - swarm defeat
          - threat discrimination

      - id: kop_002
        name: "Maintain decision advantage in contested communications"
        description: >
          Command and control resilience under jamming, cyber attack, and
          denied/degraded environments. Includes mesh networking, LPI/LPD comms,
          autonomous mission execution without connectivity, and alternative PNT.
        estimated_rank: 2
        maps_to_budget_priorities:
          - jadc2
          - electronic_warfare
          - space_resilience
        technology_indicators:
          - mesh networking
          - anti-jam
          - GPS-denied
          - resilient comms
          - autonomous navigation
          - alternative PNT

      - id: kop_003
        name: "Achieve maritime superiority in Western Pacific"
        description: >
          Distributed maritime operations, undersea warfare dominance, anti-ship
          missile defense, autonomous naval systems, contested logistics at sea,
          mine warfare, and naval integrated fire control.
        estimated_rank: 3
        maps_to_budget_priorities:
          - contested_logistics
          - autonomous_systems
        technology_indicators:
          - undersea warfare
          - anti-ship
          - autonomous naval
          - mine warfare
          - distributed maritime

      - id: kop_004
        name: "Accelerate sensor-to-shooter kill chain to machine speed"
        description: >
          End-to-end targeting chain compression from minutes to seconds.
          AI-enabled target recognition, automated battle management, cross-domain
          fire coordination, and human-on-the-loop engagement authority.
        estimated_rank: 4
        maps_to_budget_priorities:
          - jadc2
          - autonomous_systems
        technology_indicators:
          - target recognition
          - battle management
          - kill chain
          - fire coordination
          - AI targeting

      - id: kop_005
        name: "Sustain forces in contested/denied logistics environments"
        description: >
          Forward-deployed sustainment without predictable supply lines. Includes
          autonomous resupply, additive manufacturing, energy harvesting, water
          purification, and predictive logistics under fire.
        estimated_rank: 5
        maps_to_budget_priorities:
          - contested_logistics
          - supply_chain_resilience
        technology_indicators:
          - autonomous resupply
          - additive manufacturing
          - forward logistics
          - energy harvesting

      - id: kop_006
        name: "Protect space-based assets and ensure space domain access"
        description: >
          Satellite survivability, space situational awareness, counter-space
          operations, rapid reconstitution/replenishment, and ground segment
          resilience against kinetic and non-kinetic threats.
        estimated_rank: 6
        maps_to_budget_priorities:
          - space_resilience
        technology_indicators:
          - satellite protection
          - space situational awareness
          - rapid reconstitution
          - counter-space

      - id: kop_007
        name: "Secure and harden the defense supply chain"
        description: >
          Domestic production of critical components, microelectronics assurance,
          energetics/munitions surge capacity, trusted foundry, and supply chain
          visibility from raw material to deployed system.
        estimated_rank: 7
        maps_to_budget_priorities:
          - supply_chain_resilience
        technology_indicators:
          - microelectronics
          - munitions production
          - supply chain visibility
          - trusted foundry
          - domestic manufacturing

  # ---------------------------------------------------------------------------
  # Acquisition Pathway Positions
  # ---------------------------------------------------------------------------
  # Companies can be at different stages in the new MEIA→JAR→PAE pipeline.
  # Each position carries a signal value. Higher positions = stronger signal.

  pathway_stages:
    - stage: "meia_engaged"
      description: "Company participating in MEIA experimentation campaign"
      signal_value: 0.4
      data_sources:
        - "MEIA public disclosures (TBD)"
        - "SAM.gov experimentation awards"
        - "Web enrichment (press releases, company announcements)"

    - stage: "meia_validated"
      description: "Company's solution validated through MEIA experimentation"
      signal_value: 0.7
      data_sources:
        - "RRAB decisions (TBD)"
        - "Web enrichment"

    - stage: "jar_funded"
      description: "Company received JAR year-of-execution funding"
      signal_value: 0.9
      data_sources:
        - "FPDS/SAM.gov (if JAR awards are trackable)"
        - "Congressional notifications"
        - "Web enrichment"

    - stage: "pae_portfolio"
      description: "Company in a Portfolio Acquisition Executive's portfolio"
      signal_value: 1.0
      data_sources:
        - "PAE portfolio disclosures (TBD)"
        - "Program of record documentation"

  # ---------------------------------------------------------------------------
  # Commercial Pathway Indicators
  # ---------------------------------------------------------------------------
  # FY26 NDAA establishes "presumption of commerciality" — companies with
  # commercial products that can serve defense needs get a faster pathway.
  # This benefits companies that DON'T look like traditional defense contractors.

  commercial_pathway:
    description: >
      Companies leveraging commercial-first acquisition pathway under FY26 NDAA
      Section 812 (nontraditional defense contractor expansion) and presumption
      of commerciality provisions. Signals: company has commercial revenue,
      COTS/MOTS products, and can deliver capability without defense-specific
      modification.
    indicators:
      - "Has commercial revenue outside defense"
      - "Product is COTS/MOTS adaptable"
      - "Previously classified as nontraditional defense contractor"
      - "Used FAR Part 12 commercial item procedures"

  # ---------------------------------------------------------------------------
  # NDAA Reform Provisions (scored as tailwinds/headwinds)
  # ---------------------------------------------------------------------------
  reform_provisions:
    - provision: "TINA threshold raise ($2.5M → $10M)"
      effective: "2026-07-01"
      impact: "tailwind"
      benefits: "Companies with contracts $2.5M-$10M avoid certified cost data"
      
    - provision: "CAS threshold raise ($50M → $100M)"
      effective: "TBD (180 days from enactment)"
      impact: "tailwind"
      benefits: "Mid-tier companies avoid full Cost Accounting Standards compliance"

    - provision: "Nontraditional defense contractor expansion (Sec 811-812)"
      effective: "2025-12-18"
      impact: "tailwind"
      benefits: "Broader definition of nontraditional, fewer compliance burdens"

    - provision: "Modular open systems approach requirement (Sec 1832)"
      effective: "2025-12-18"
      impact: "mixed"
      benefits: "Favors open-architecture companies; burdens proprietary-locked primes"

    - provision: "SBIR/STTR authorization lapse and reauthorization"
      effective: "2025-10-01"
      reauthorized: "2026-03-04"
      impact: "headwind_recovering"
      benefits: "SBIR pipeline disruption for companies dependent on Phase I/II funding"
      note: >
        SBIR/STTR authorizations lapsed Oct 1, 2025. Reauthorized March 4, 2026
        under the Small Business Innovation and Economic Security Act (5-year,
        through Sept 30, 2031). ~5 months of pipeline disruption. Agencies now
        restarting solicitations but backlog processing will take time through
        Q3 2026. Affects ~2,378 companies in the Phase II pipeline.

# =============================================================================
# SBIR Reauthorization Context (March 2026)
# =============================================================================

sbir_reauthorization_2026:
  status: "reauthorized"
  authority: "Small Business Innovation and Economic Security Act"
  reauthorized_date: "2026-03-04"  # Senate passage
  expiration: "2031-09-30"
  lapse_period: "2025-10-01 to 2026-03-04"  # ~5 months
  key_changes:
    - "Strategic Breakthrough Awards: new program, 100% matching fund required,
       48-month performance period, targets late-stage development to market entry"
    - "Proposal caps: limits on submissions per company per year to reduce SBIR mills"
    - "Foreign due diligence: strengthened screening, agencies must notify flagged companies"
    - "Improved data collection: Phase III, direct-to-Phase-II, subcontracting tracking"
    - "5-year window eliminates recurring 3-year reauthorization crises"
  strategic_breakthrough_timeline:
    first_dod_solicitations: "Q4 FY2026 (July-September 2026)"
    other_agencies: "FY2027"
    note: "Companies need committed matching capital BEFORE applying"

sbir_lapse_context:
  affected_companies: 2378  # Phase II companies mid-program during lapse
  lapse_start: "2025-10-01"
  lapse_end: "2026-03-04"
  signal_implication: >
    sbir_lapse_risk signal remains relevant for pipeline disruption tracking
    even post-reauthorization. Agencies need time to process backlog before
    new awards flow. Signal should remain active through Q3 2026.
