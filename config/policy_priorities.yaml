# Aperture Signals — Policy Priority Configuration v2
# Updated: March 11, 2026
#
# CHANGE LOG:
#   v1 (Feb 2026): 10 budget-derived priority areas with FY26 growth weights
#   v2 (Feb 2026): Added acquisition_framework layer for MEIA/KOP/JAR/PAE alignment
#                  Budget weights preserved as baseline; KOP weights override when active
#
# ARCHITECTURE:
#   The scoring system now operates in two layers:
#     Layer 1 (budget_priorities): Existing FY26 budget-growth weights — always active
#     Layer 2 (acquisition_framework): MEIA/KOP/JAR alignment — activates as data becomes available
#
#   When both layers are active:
#     policy_tailwind_score = 0.6 * budget_tailwind + 0.4 * acquisition_tailwind
#
#   When only Layer 1 is active (current state):
#     policy_tailwind_score = budget_tailwind (unchanged from v1)
#
# The acquisition_framework layer is forward-looking. Signal types and KOP definitions
# are stubbed now and activate when MEIA experimentation data becomes publicly trackable.
# ---

version: 2

# =============================================================================
# LAYER 1: Budget-Derived Priority Areas (unchanged from v1)
# =============================================================================
# Source: FY25 → FY26 President's Budget Request growth rates
# Formula: sum(score * budget_weight) / sum(budget_weight) for priorities where score > 0.2

budget_priorities:
  space_resilience:
    weight: 0.235
    fy26_growth: "+38%"
    description: >
      Space-based capabilities, satellite resilience, space domain awareness,
      on-orbit servicing, space launch, counter-space, ground segment hardening,
      LEO/MEO constellation proliferation, space-based ISR, PNT alternatives
    keywords:
      - satellite
      - space domain awareness
      - on-orbit servicing
      - counter-space
      - space launch
      - constellation
      - LEO
      - cislunar
      - space resilience
      - GPS alternative
      - PNT

  nuclear_modernization:
    weight: 0.170
    fy26_growth: "+17%"
    description: >
      Nuclear triad modernization (Sentinel ICBM, Columbia SSBN, B-21),
      nuclear command and control (NC3), nuclear surety, warhead life extension,
      NNSA programs, nuclear enterprise digital engineering
    keywords:
      - nuclear
      - ICBM
      - SSBN
      - B-21
      - NC3
      - warhead
      - tritium
      - nuclear command

  autonomous_systems:
    weight: 0.130
    fy26_growth: "+10%"
    description: >
      Unmanned/autonomous systems across all domains — UAS/UAV/drones (Group 1-5),
      counter-UAS/C-UAS, UGV, USV, UUV, autonomous navigation, swarm technology,
      attritable/expendable platforms, collaborative combat aircraft (CCA),
      autonomy software, human-machine teaming, AI-enabled mission systems,
      loitering munitions, tactical ISR drones, drone-in-a-box
    keywords:
      - UAS
      - UAV
      - drone
      - counter-UAS
      - C-UAS
      - autonomous
      - unmanned
      - UGV
      - USV
      - UUV
      - swarm
      - attritable
      - CCA
      - loitering munition

  supply_chain_resilience:
    weight: 0.110
    fy26_growth: "+7%"
    description: >
      Defense industrial base resilience, critical mineral sourcing, domestic
      manufacturing, microelectronics/CHIPS Act alignment, energetics/munitions
      production, castings and forgings, submarine supplier base, second-source
      qualification, DMEA trusted foundry
    keywords:
      - supply chain
      - domestic manufacturing
      - microelectronics
      - munitions production
      - energetics
      - critical minerals
      - second source
      - trusted foundry

  contested_logistics:
    weight: 0.100
    fy26_growth: "+10%"
    description: >
      Logistics under fire, distributed maritime operations, expeditionary
      advanced base operations, fuel/energy resilience, autonomous resupply,
      additive manufacturing in theater, predictive maintenance, contested
      aerial refueling
    keywords:
      - contested logistics
      - distributed operations
      - expeditionary
      - autonomous resupply
      - predictive maintenance
      - additive manufacturing

  electronic_warfare:
    weight: 0.085
    fy26_growth: "+10%"
    description: >
      Electronic attack/protect/support, spectrum operations, cognitive EW,
      signals intelligence, electronic countermeasures, anti-jam communications,
      RF sensing, electromagnetic spectrum superiority, GPS-denied operations,
      navigation warfare
    keywords:
      - electronic warfare
      - EW
      - spectrum
      - cognitive EW
      - anti-jam
      - SIGINT
      - electromagnetic
      - GPS-denied
      - NAVWAR

  jadc2:
    weight: 0.075
    fy26_growth: "+10%"
    description: >
      Joint All-Domain Command and Control, data mesh/fabric, tactical edge
      computing, cross-domain solutions, Link 16 modernization, ABMS, Project
      Overmatch, battle management, kill chain integration, sensor-to-shooter,
      mission partner environment
    keywords:
      - JADC2
      - command and control
      - data mesh
      - tactical edge
      - ABMS
      - kill chain
      - sensor to shooter

  border_homeland:
    weight: 0.050
    fy26_growth: "+10%"
    description: >
      Border security technology, CBP/DHS systems, wide-area surveillance,
      biometrics, counter-narcotic technology, tunnel detection, maritime
      domain awareness for homeland defense
    keywords:
      - border security
      - CBP
      - biometrics
      - wide-area surveillance
      - counter-narcotic

  cyber_offense_defense:
    weight: 0.030
    fy26_growth: "+10%"
    description: >
      Offensive/defensive cyber operations, cyber mission force tools,
      zero trust architecture, software supply chain security, AI-enabled
      cyber defense, hunt forward operations, CMMC compliance tools
    keywords:
      - cyber
      - zero trust
      - CMMC
      - cyber defense
      - hunt forward

  hypersonics:
    weight: 0.015
    fy26_growth: "-43%"
    description: >
      Hypersonic strike, boost-glide vehicles, scramjet propulsion,
      hypersonic defense/intercept, thermal protection, flight test
      infrastructure. NOTE: Budget declining significantly.
    keywords:
      - hypersonic
      - scramjet
      - boost-glide
